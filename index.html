<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Канапе — кейтеринг вкуса и атмосферы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="header-backdrop"></div>
  <div class="site-shell" id="top">
    <!-- Header rendered by JS -->
    <header class="header" data-header></header>

    <!-- Mobile menu rendered by JS -->
    <div class="mobile-menu" data-mobile-menu></div>

    <main>
      <!-- Hero rendered by JS -->
      <section class="hero section" id="request" data-hero></section>

      <!-- Menu layout rendered by JS -->
      <section class="menu-layout section" id="menu" data-menu-layout></section>

      <!-- About rendered by JS -->
      <section class="about section" id="about" data-about></section>

      <!-- Events rendered by JS -->
      <section class="events section" id="events" data-events></section>
    </main>

    <!-- Footer rendered by JS -->
    <footer class="footer" id="contacts" data-footer></footer>

    <!-- Mobile bottom CTA -->
    <div class="mobile-bottom-cta" data-mobile-cta></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
